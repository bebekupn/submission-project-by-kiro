<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💰 Expense Tracker</h1>
            <button id="themeToggle" class="theme-toggle" title="Toggle dark/light mode">🌙</button>
        </header>

        <!-- Total Balance Section -->
        <div class="balance-section">
            <div class="balance-card">
                <h2>Total Balance</h2>
                <p class="balance-amount" id="totalBalance">$0.00</p>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="content-grid">
            <!-- Left Column: Form and List -->
            <div class="left-column">
                <!-- Add Transaction Form -->
                <section class="form-section">
                    <h3>Add Transaction</h3>
                    <form id="transactionForm">
                        <div class="form-group">
                            <label for="itemName">Item Name</label>
                            <input 
                                type="text" 
                                id="itemName" 
                                placeholder="e.g., Groceries" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="amount">Amount ($)</label>
                            <input 
                                type="number" 
                                id="amount" 
                                placeholder="0.00" 
                                step="0.01" 
                                min="0" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="">Select a category</option>
                                <option value="Food">🍕 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Fun">🎮 Fun</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="customCategory">Or add custom category</label>
                            <div class="custom-category-input">
                                <input 
                                    type="text" 
                                    id="customCategory" 
                                    placeholder="e.g., Shopping"
                                >
                                <button type="button" id="addCustomBtn" class="btn-secondary">Add</button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                </section>

                <!-- Transaction List -->
                <section class="list-section">
                    <div class="list-header">
                        <h3>Transactions</h3>
                        <div class="sort-controls">
                            <label for="sortBy">Sort by:</label>
                            <select id="sortBy">
                                <option value="date">Date (Recent)</option>
                                <option value="amount-desc">Amount (High to Low)</option>
                                <option value="amount-asc">Amount (Low to High)</option>
                                <option value="category">Category</option>
                            </select>
                        </div>
                    </div>
                    <div class="transaction-list" id="transactionList">
                        <p class="empty-state">No transactions yet. Add one above!</p>
                    </div>
                </section>
            </div>

            <!-- Right Column: Chart -->
            <div class="right-column">
                <section class="chart-section">
                    <h3>Spending Distribution</h3>
                    <div class="chart-container">
                        <canvas id="spendingChart"></canvas>
                    </div>
                    <div class="chart-legend" id="chartLegend"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
